<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kory Whisper 权限引导</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #f2f6ff 0%, #f6f7fb 100%);
      color: #233043;
      line-height: 1.6;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 20px 36px;
    }

    .hero {
      margin-bottom: 20px;
      padding: 20px 22px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 12px 35px rgba(20, 39, 78, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.72);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #14213d;
    }

    .lead {
      font-size: 14px;
      color: #526176;
    }

    .section {
      background: white;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 8px 22px rgba(20, 39, 78, 0.08);
      border: 1px solid #ebeff7;
    }

    .section h2 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #607086;
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }

    .summary {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #f7f9fd;
    }

    #permission-summary {
      font-size: 13px;
      color: #334155;
    }

    .muted {
      font-size: 12px;
      color: #708094;
    }

    .permission-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .permission-card {
      padding: 16px;
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfcff 100%);
      border: 1px solid #e7ecf5;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .permission-card h3 {
      font-size: 16px;
      color: #162238;
    }

    .permission-status {
      display: inline-flex;
      align-self: flex-start;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e9eefb;
      color: #334155;
      font-size: 12px;
      font-weight: 600;
    }

    .permission-status.is-granted {
      background: #ddf7e7;
      color: #12623f;
    }

    .permission-status.is-missing,
    .permission-status.is-unknown {
      background: #fff0db;
      color: #9a5818;
    }

    .permission-status.is-unsupported {
      background: #edf0f3;
      color: #677389;
    }

    .permission-why {
      font-size: 13px;
      color: #44546b;
    }

    .permission-reason {
      font-size: 12px;
      color: #7a8699;
      min-height: 2.4em;
    }

    .permission-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: auto;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: #1d4ed8;
      color: white;
    }

    .btn-secondary {
      background: #e5e9f2;
      color: #243244;
    }

    .btn-secondary:hover {
      background: #d8dfec;
    }

    .footer-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    @media (max-width: 760px) {
      .permission-grid {
        grid-template-columns: 1fr;
      }

      .summary,
      .footer-actions {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1 id="onboarding-title">Kory Whisper 权限引导</h1>
      <p class="lead" id="onboarding-lead">完成麦克风、辅助功能和输入监控后，语音输入才会进入可用状态。</p>
    </div>

    <div class="section">
      <h2>权限状态</h2>
      <div class="summary">
        <div>
          <div id="permission-summary">正在读取权限状态…</div>
          <div class="muted" id="permission-updated-at"></div>
        </div>
        <button class="btn-secondary" id="refresh-permissions" type="button">重新检查权限</button>
      </div>
      <div class="permission-grid" id="permission-grid"></div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const FALLBACK_SURFACES = [
      {
        key: 'microphone',
        label: 'Microphone',
        onboardingLabel: '麦克风',
        menuLabel: '麦克风',
        actionLabel: '打开麦克风设置',
        why: '用于录制你说的话，并把声音送进转写流程。'
      },
      {
        key: 'accessibility',
        label: 'Accessibility',
        onboardingLabel: '辅助功能',
        menuLabel: '辅助功能',
        actionLabel: '打开辅助功能设置',
        why: '用于把转写结果输入到当前应用，并维持快捷键控制。'
      },
      {
        key: 'inputMonitoring',
        label: 'Input Monitoring',
        onboardingLabel: '输入监控',
        menuLabel: '输入监控',
        actionLabel: '打开输入监控设置',
        why: '用于监听全局快捷键，让你在任意应用里启动语音输入。'
      }
    ];

    const FALLBACK_CONTRACT = {
      surfaces: FALLBACK_SURFACES,
      surfaceOrder: ['microphone', 'accessibility', 'inputMonitoring'],
      onboarding: {
        title: 'Kory Whisper 权限引导',
        lead: '完成麦克风、辅助功能和输入监控后，语音输入才会进入可用状态。',
        statusLabels: {
          granted: '已授权',
          missing: '未授权',
          unknown: '状态未知',
          unsupported: '系统不支持'
        },
        readySummary: '当前平台权限已满足。',
        blockedSummary: '还有权限需要处理，完成后点击重新检查。',
        noPermissionMessage: '当前平台不需要额外权限配置。'
      },
      menu: {
        openPermissionSetupLabel: 'Open Permission Setup',
        recheckPermissionsLabel: 'Re-check Permissions'
      }
    };

    const permissionContractState = {
      contract: FALLBACK_CONTRACT
    };

    function mergePermissionContract(rawContract = {}) {
      const contract = rawContract && typeof rawContract === 'object' ? rawContract : {};
      const hasExplicitSurfaces = Object.prototype.hasOwnProperty.call(contract, 'surfaces') && Array.isArray(contract.surfaces);
      const hasExplicitSurfaceOrder = Object.prototype.hasOwnProperty.call(contract, 'surfaceOrder') && Array.isArray(contract.surfaceOrder);
      const mergedSurfaces = hasExplicitSurfaces ? contract.surfaces : FALLBACK_SURFACES;
      const mergedSurfaceOrder = hasExplicitSurfaceOrder
        ? contract.surfaceOrder
        : Array.isArray(mergedSurfaces) && mergedSurfaces.length > 0
          ? mergedSurfaces.map((surface) => surface.key).filter(Boolean)
          : [];

      return {
        ...FALLBACK_CONTRACT,
        ...contract,
        surfaces: Array.isArray(mergedSurfaces) ? mergedSurfaces : FALLBACK_CONTRACT.surfaces,
        surfaceOrder: mergedSurfaceOrder,
        onboarding: {
          ...FALLBACK_CONTRACT.onboarding,
          ...(contract.onboarding || {})
        },
        menu: {
          ...FALLBACK_CONTRACT.menu,
          ...(contract.menu || {})
        }
      };
    }

    function getContractSurfaceOrder(contract = {}) {
      const hasExplicitSurfaceOrder = Object.prototype.hasOwnProperty.call(contract, 'surfaceOrder') && Array.isArray(contract.surfaceOrder);
      if (hasExplicitSurfaceOrder) {
        return contract.surfaceOrder;
      }

      if (Array.isArray(contract.surfaces) && contract.surfaces.length > 0) {
        return contract.surfaces.map((surface) => surface.key).filter(Boolean);
      }

      return FALLBACK_CONTRACT.surfaceOrder;
    }

    function getSurfaceConfig(contract = {}, key) {
      if (Array.isArray(contract.surfaces)) {
        const exact = contract.surfaces.find((surface) => surface && surface.key === key);
        if (exact) {
          return exact;
        }
      }

      return FALLBACK_SURFACES.find((surface) => surface.key === key) || null;
    }

    function getPermissionStatusLabel(surface) {
      const statusLabels = permissionContractState.contract.onboarding?.statusLabels || FALLBACK_CONTRACT.onboarding.statusLabels;
      return statusLabels[surface.status] || statusLabels.unknown;
    }

    function getReadableSurfaceLabel(surfaceConfig, surfaceName) {
      return (
        surfaceConfig && (surfaceConfig.onboardingLabel || surfaceConfig.label || surfaceConfig.menuLabel)
      )
        ? (surfaceConfig.onboardingLabel || surfaceConfig.label || surfaceConfig.menuLabel)
        : surfaceName;
    }

    function clearPermissionCards() {
      const grid = document.getElementById('permission-grid');
      grid.innerHTML = '';
    }

    function renderSurfaceCard(surfaceConfig, surface, surfaceName) {
      const card = document.createElement('article');
      card.className = 'permission-card';
      card.setAttribute('data-permission-surface', surfaceName);
      card.dataset.permissionSurface = surfaceName;

      const heading = document.createElement('h3');
      heading.textContent = getReadableSurfaceLabel(surfaceConfig, surfaceName);

      const statusElement = document.createElement('span');
      statusElement.className = `permission-status is-${surface.status || 'unknown'}`;
      statusElement.textContent = getPermissionStatusLabel(surface);

      const reasonIntro = document.createElement('p');
      reasonIntro.className = 'permission-why';
      reasonIntro.textContent = surfaceConfig.why || '';

      const reasonElement = document.createElement('p');
      reasonElement.className = 'permission-reason';
      reasonElement.textContent = surface.reason
        ? `当前状态说明: ${surface.reason}.`
        : '';

      const actions = document.createElement('div');
      actions.className = 'permission-actions';

      const actionButton = document.createElement('button');
      actionButton.className = 'btn-primary';
      actionButton.type = 'button';
      actionButton.disabled = surface.status === 'unsupported';
      actionButton.textContent = surface.status === 'unsupported'
        ? '系统不支持'
        : (surfaceConfig.actionLabel || `打开${getReadableSurfaceLabel(surfaceConfig, surfaceName)}设置`);
      actionButton.onclick = () => {
        if (surface.status === 'unsupported') {
          return;
        }
        ipcRenderer.invoke('open-permission-settings', surface.settingsTarget);
      };

      actions.appendChild(actionButton);

      card.appendChild(heading);
      card.appendChild(statusElement);
      card.appendChild(reasonIntro);
      card.appendChild(reasonElement);
      card.appendChild(actions);

      return card;
    }

    function renderPermissionMetadata(readiness) {
      const onboardingContract = permissionContractState.contract.onboarding || FALLBACK_CONTRACT.onboarding;
      const title = onboardingContract.title || FALLBACK_CONTRACT.onboarding.title;
      const lead = onboardingContract.lead || FALLBACK_CONTRACT.onboarding.lead;

      document.getElementById('onboarding-title').textContent = title;
      document.getElementById('onboarding-lead').textContent = lead;

      const summary = document.getElementById('permission-summary');
      const updatedAt = document.getElementById('permission-updated-at');
      summary.textContent = readiness.isReady
        ? (onboardingContract.readySummary || '当前平台权限已满足。')
        : (onboardingContract.blockedSummary || '还有权限需要处理，完成后点击重新检查。');
      updatedAt.textContent = `最后刷新: ${new Date(readiness.refreshedAt).toLocaleString()}`;
    }

    function renderSurfaces(readiness) {
      const grid = document.getElementById('permission-grid');
      clearPermissionCards();

      const contract = permissionContractState.contract;
      const surfaceOrder = getContractSurfaceOrder(contract);
      let renderedCount = 0;

      surfaceOrder.forEach((surfaceName) => {
        const surfaceConfig = getSurfaceConfig(contract, surfaceName);
        if (!surfaceConfig || !surfaceConfig.key) {
          return;
        }

        const surface = readiness.surfaces[surfaceName] || { status: 'unknown' };
        if (!surface.status) {
          surface.status = 'unknown';
        }
        surface.settingsTarget = surface.settingsTarget || surfaceConfig.settingsTarget || surfaceName;
        surface.status = surface.status || 'unknown';

        renderedCount += 1;
        grid.appendChild(renderSurfaceCard(surfaceConfig, surface, surfaceName));
      });

      if (renderedCount === 0) {
        const fallback = (contract.onboarding || FALLBACK_CONTRACT.onboarding).noPermissionMessage || FALLBACK_CONTRACT.onboarding.noPermissionMessage;
        const empty = document.createElement('p');
        empty.className = 'muted';
        empty.textContent = fallback;
        grid.appendChild(empty);
      }
    }

    async function loadPermissionContract() {
      try {
        const appConfig = await ipcRenderer.invoke('get-config');
        const contract = appConfig?.platformContract?.permission
          ? appConfig.platformContract.permission
          : FALLBACK_CONTRACT;
        permissionContractState.contract = mergePermissionContract(contract);
      } catch {
        permissionContractState.contract = FALLBACK_CONTRACT;
      }
    }

    async function refreshPermissions() {
      const readiness = await ipcRenderer.invoke('get-permission-readiness');
      renderPermissionMetadata(readiness);
      renderSurfaces(readiness);
    }

    async function recheckPermissions() {
      const readiness = await ipcRenderer.invoke('recheck-permission-readiness');
      renderPermissionMetadata(readiness);
      renderSurfaces(readiness);
    }

    document.getElementById('refresh-permissions').addEventListener('click', recheckPermissions);
    ipcRenderer.on('permission-readiness-updated', (event, readiness) => {
      renderPermissionMetadata(readiness);
      renderSurfaces(readiness);
    });

    window.addEventListener('focus', () => {
      recheckPermissions().catch((error) => {
        document.getElementById('permission-summary').textContent = `读取失败: ${error.message}`;
      });
    });

    loadPermissionContract().then(() => {
      refreshPermissions().catch((error) => {
        document.getElementById('permission-summary').textContent = `读取失败: ${error.message}`;
      });
    });
  </script>
</body>
</html>
